<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyRooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="progressbar"></div>
    <nav>
        <h1>StudyRooms</h1>
        <div>
            <button onclick="window.location.href='login.html'">Login</button>
            <button onclick="window.location.href='signup.html'">Sign Up</button>
        </div>       
    </nav>
    
    <main>
        <button id="browseroombtn">+ Browse Room</button>
        <button id="createroombtn">+ Create Room</button>
    </main>
    <section id="heroSection">
    <div class="hero-box">
        <h2>your virtual study space</h2>
        <p>StudyRooms lets you create and join focused study rooms with others. Set a timer, lock in, and leave notes on the wall for your study buddies.</p>
        <div class="hero-features">
            <span>⏱ Study Timer</span>
            <span>📝 Wall Notes</span>
            <span>🚪 Join Rooms</span>
        </div>
        <p class="created-by">created by <strong>Lohith Virothi</strong></p>
    </div>
</section>
    <section id="roomsSection" style="display:none">
    <input type="text" id="searchInput" placeholder="Search rooms...">
    <div id="roomsContainer"></div>
    </section>
    <div style="display: flex; justify-content: center;">
    <div id="createroommodal" style="display:none">
        <h2>create a room</h2>
        <input type="text" id="roomtitle" placeholder="Room Title">
        <input type="text" id="roomdescription" placeholder="Description (optional)">
        <button id="submitroombtn">Create</button>
        <button id="closemodalbtn">Cancel</button>
    </div>
    </div>
    <div class="tree" style="left: 5%; animation-delay: 0s;"></div>
<div class="tree" style="left: 15%; animation-delay: 0.5s; height: 250px;"></div>
<div class="tree" style="right: 5%; animation-delay: 1s;"></div>
<div class="tree" style="right: 15%; animation-delay: 1.5s; height: 180px;"></div>
    <script src="app.js"></script>
    <script src="progress.js"></script>
</body>
</html>
